[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "node index.js"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true

[context.production]
  environment = { NODE_ENV = "production" }
