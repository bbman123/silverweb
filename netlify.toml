[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[dev]
  command = "node index.js"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.js"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

[context.branch-deploy]
  environment = { NODE_ENV = "preview" }
